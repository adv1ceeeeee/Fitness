name: sportwai
description: SportWAI - мобильное приложение для отслеживания тренировок
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.8.0
  go_router: ^14.2.0
  flutter_riverpod: ^2.5.1
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  fl_chart: ^0.69.0
  path_provider: ^2.1.2
  share_plus: ^10.0.0
  uuid: ^4.4.0
  connectivity_plus: ^6.0.3
  flutter_typeahead: ^5.2.0
  http: ^1.2.2
  table_calendar: ^3.1.0
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
